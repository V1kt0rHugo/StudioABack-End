version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: StudioA_DB
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: studio-senhaA
      POSTGRES_DB: StudioA_DB
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
